---
site_name: dont_be_lazy
site_url: https://dont_be_lazy.readthedocs.io/
site_author: Matthew Martin <matthewdeanmartin@gmail.com>
site_description: Tool that finds evidence of past skipped linting
repo_url: https://github.com/matthewdeanmartin/dont_be_lazy
theme:
  name: readthedocs
  features: [navigation.footer]
edit_uri: edit/main/docs/
markdown_extensions:
  - attr_list
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Overview: overview/README.md
  - Installation: installation.md
  - Usage:
      - Quick Start: usage/quickstart.md
  - Contributing: extending/CONTRIBUTING.md
  - Changelog: changelog.md
validation:
  nav:
    omitted_files: warn
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
